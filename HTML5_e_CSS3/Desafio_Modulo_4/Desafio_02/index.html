<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/all.css">
    <link rel="stylesheet" href="styles/mediaQuery.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
    <title>Login</title>
</head>
<body>
    <main>
        <section id="login">
            <div id="image"></div>
            <div id="form">
                <h1>Login</h1>
                <p>Seja bem vindo(a) novamente. Faça login para para acessar sua conta e realizar as configurações do ambiente.</p>
                <form action="" method="post">
                    <div class="field">
                        <label for="user"><span class="material-symbols-outlined">person</span></label>
                        <input type="email" name="user" id="user" maxlength="30" placeholder="Nome de Usuário" required>
                    </div>
                    <div class="field">
                        <label for="password"><span class="material-symbols-outlined">key</span></label>
                        <input type="password" name="password" id="password" minlength="8" maxlength="20" placeholder="Senha" required>
                    </div>
                    <input type="submit" value="Entrar">
                    <a href="#" class="buttom"><span class="material-symbols-outlined">mail</span> Esqueci a senha</a>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
